<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Renato</title>

  <!-- DEV ICONS (igual home) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <!-- PHOSPHOR ICONS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>&lt;/R.dev&gt;</h1>

    <nav>
      <ul>
        <li><a href="../home/index.html">Início</a></li>
        <li><a href="../sobre/index.html">Sobre</a></li>
        <li><a href="../projetos/index.html">Projetos</a></li>
        <li><a href="../novidades/index.html">Novidades</a></li>
        <li><a href="./index.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="contact">

      <h2>Entre em Contato</h2>
      <p class="subtitle">
        Tem alguma oportunidade ou projeto? Me manda uma mensagem 🚀
      </p>

      <div id="contact-container">

        <!-- FORM -->
        <form id="contact-form">

          <div class="input-group">
            <label>Nome</label>
            <input type="text" placeholder="Seu nome" required>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com" required>
          </div>

          <div class="input-group">
            <label>Mensagem</label>
            <textarea rows="5" placeholder="Digite sua mensagem..." required></textarea>
          </div>

          <button type="submit">Enviar mensagem</button>

        </form>

        <!-- REDES SOCIAIS (NOVO) -->
        <div id="contact-social">

          <h3>Ou me encontre aqui</h3>

          <div class="social-links">

            <a href="https://www.linkedin.com/in/renato-mendonca-granata/" target="_blank">
              <i class="devicon-linkedin-plain"></i>
            </a>

            <a href="https://github.com/RenatoGranata" target="_blank">
              <i class="devicon-github-original"></i>
            </a>

            <a href="#">
              <i class="ph-bold ph-instagram-logo"></i>
            </a>

            <a href="#">
              <i class="ph-bold ph-x-logo"></i>
            </a>

          </div>

        </div>

      </div>

      <div class="availability">
        <span></span>
        Disponível para oportunidades
      </div>

    </section>
  </main>

  <footer>
    <div id="footer-copy">
      <p>&copy; 2026 Renato. Todos os direitos reservados.</p>
    </div>
  </footer>

</body>

</html>
